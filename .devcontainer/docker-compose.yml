services:
  app:
    build:
      context: ..
      target: dev
      dockerfile: Dockerfile
    command: sleep infinity
    tty: true
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      DB_NAME: starterdb
      DB_USER: starteruser
      DB_PASSWORD: starterpass
      DB_HOST: db
      DB_PORT: 5432
      PG_CONNECTION_STRING: postgres://starteruser:starterpass@db:5432/starterdb
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_TLS_REJECT_UNAUTHORIZED: "false"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 500
    expose:
      - "3000"
    volumes:
      - "..:/app:delegated"
      - "starter_dev_node_modules:/app/node_modules"
    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      starter_dev:

  database:
    image: postgres:18.2-trixie
    environment:
      POSTGRES_PASSWORD: starterpass
      POSTGRES_DB: starterdb
      POSTGRES_USER: starteruser
    expose:
      - "5432"
    volumes:
      - "starter_dev_db_data:/var/lib/postgresql"
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "starterdb", "-U", "starteruser"]
      interval: 10s
      timeout: 10s
      retries: 3
    networks:
      starter_dev:
        aliases:
          - db

  mailpit:
    image: axllent/mailpit:latest
    expose:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_MAX_MESSAGES: 1000
    restart: unless-stopped
    networks:
      starter_dev:

volumes:
  starter_dev_db_data:
  starter_dev_node_modules:

networks:
  starter_dev:
